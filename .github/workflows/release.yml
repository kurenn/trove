name: Release

# Build signed desktop bundles for every platform when a version tag is pushed
# (e.g. `git tag v2.1.0 && git push origin v2.1.0`) and attach them to a draft
# GitHub Release. Trigger manually too via the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Create the draft release ONCE (notes from CHANGELOG.md + shared footer), so the
  # per-platform build jobs upload into it instead of racing to create it.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          SECTION=$(awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md)
          {
            echo "body<<__NOTES_EOF__"
            echo "## What's new in ${GITHUB_REF_NAME}"
            if [ -n "$SECTION" ]; then echo "$SECTION"; fi
            echo ""
            echo "---"
            echo ""
            cat .github/release-footer.md
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          TAG: ${{ github.ref_name }}
          BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: `Trove ${process.env.TAG}`,
              body: process.env.BODY,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and emits latest.json so installed apps
          # can verify + auto-update. Keys live in repo Actions secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the release created above — no create-race between jobs.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
