name: Release

# Build signed-less desktop bundles for every platform when a version tag is
# pushed (e.g. `git tag v2.0.0 && git push --tags`), and attach them to a draft
# GitHub Release. Trigger manually too via the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and emits latest.json so installed apps
          # can verify + auto-update. Keys live in repo Actions secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Trove ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | Download |
            |---|---|
            | 🍎 **macOS — Apple Silicon** (M1/M2/M3/M4) | `Trove_*_aarch64.dmg` |
            | 🍎 **macOS — Intel** | `Trove_*_x64.dmg` |
            | 🪟 **Windows** | `Trove_*_x64-setup.exe` (or `Trove_*_x64_en-US.msi`) |
            | 🐧 **Linux** | `Trove_*_amd64.AppImage`, `.deb`, or `.x86_64.rpm` |

            > The `.app.tar.gz` and `.sig` files are for Trove's in-app auto-updater — you don't need to download them.

            **macOS note:** the app is unsigned, so on first launch **right-click → Open** (or System Settings → Privacy & Security → Open Anyway).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
